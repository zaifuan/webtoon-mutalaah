services:
  db:
    image: postgres:16-alpine
    container_name: webtoon-mutalaah-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-webtoon}
      POSTGRES_PASSWORD: ${PGPASSWORD:-webtoon}
      POSTGRES_DB: ${PGDATABASE:-webtoon_mutalaah}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Diikat ke localhost sahaja demi keselamatan (untuk debugging dari host).
    # Buang baris di bawah jika anda tidak perlu akses DB dari luar container.
    ports:
      - "127.0.0.1:${PGPORT_HOST:-5545}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-webtoon} -d ${PGDATABASE:-webtoon_mutalaah}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: webtoon-mutalaah-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-webtoon}
      PGPASSWORD: ${PGPASSWORD:-webtoon}
      PGDATABASE: ${PGDATABASE:-webtoon_mutalaah}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-dummy-image}
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://127.0.0.1:8188}
      AI_PROVIDER: ${AI_PROVIDER:-dummy}
      # Fasa 19 — Claude (Anthropic Messages API). Default sistem kekal 'dummy'.
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      CLAUDE_API_VERSION: ${CLAUDE_API_VERSION:-2023-06-01}
      CLAUDE_TIMEOUT_MS: ${CLAUDE_TIMEOUT_MS:-60000}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-2048}
      CLAUDE_TEMPERATURE: ${CLAUDE_TEMPERATURE:-0.4}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    ports:
      - "${APP_PORT:-3000}:3000"
    # Fasa 8 — ikat folder uploads ke host supaya gambar kekal selepas rebuild
    # dan boleh disalin masuk melalui WinSCP untuk import-local.
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    # Jalankan migration dahulu, kemudian mulakan pelayan.
    command: sh -c "node src/migrate.js && node src/server.js"

volumes:
  db_data:
