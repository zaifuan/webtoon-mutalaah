<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#161b2e" />
  <title>Webtoon Mutalaah</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="appbar">
    <a class="brand" href="#/" aria-label="Webtoon Mutalaah — laman utama">
      <span class="brand-ar" lang="ar" dir="rtl">مطالعة</span>
      <span class="brand-name">Webtoon&nbsp;Mutalaah</span>
    </a>
    <span id="health" class="health health--loading" title="Menyemak API…" aria-live="polite">
      <span class="health-dot" aria-hidden="true"></span>
    </span>
  </header>

  <main id="view" class="view" aria-live="polite"></main>

  <div id="modal-root" class="modal-root" hidden></div>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="/app.js" defer></script>
</body>
</html>
